# New-API Docker Compose Configuration
#
# Quick Start:
#   1. docker compose up -d
#   2. Access at http://localhost:3480
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and SQL_DSN line below
#   2. Uncomment the mysql service and SQL_DSN line below
#   3. Uncomment mysql in depends_on
#   4. Uncomment mysql_data in volumes section

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api-local:latest
    pull_policy: never
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3480:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:1006@postgres:5432/new-api
#      - SQL_DSN=root:1006@tcp(mysql:3306)/new-api
      - REDIS_CONN_STRING=redis://:1006@redis:6379
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-node-1
    depends_on:
      - redis
      - postgres
#      - mysql
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "1006"]
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 1006
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
#    ports:
#      - "5432:5432"

#  mysql:
#    image: mysql:8.2
#    container_name: mysql
#    restart: always
#    environment:
#      MYSQL_ROOT_PASSWORD: 1006
#      MYSQL_DATABASE: new-api
#    volumes:
#      - mysql_data:/var/lib/mysql
#    networks:
#      - new-api-network
#    ports:
#      - "3306:3306"

volumes:
  pg_data:
#  mysql_data:

networks:
  new-api-network:
    driver: bridge
